name: microct_analysis
channels: [conda-forge]
dependencies:
  - python=3.11
  - pip
  - pip:
      - numpy
      - nibabel>=5
      - pydicom>=2.4
      - scikit-image>=0.22
      - scipy
      - SimpleITK>=2.3
      - pyyaml
      - openpyxl
      - matplotlib
      # Editable install of the vendored voxbone package (source lives at
      # <skillDir>/assets/voxbone). pip resolves this relative path against the
      # process CWD when micromamba runs `env create -f environment.yml`; the
      # harness (src/harness/runtime-setup) spawns micromamba from the skill dir,
      # so `./assets/voxbone` is assumed to resolve there. VALIDATE on a real
      # conda run — if it fails, the path is CWD-relative to the harness root.
      - -e ./assets/voxbone

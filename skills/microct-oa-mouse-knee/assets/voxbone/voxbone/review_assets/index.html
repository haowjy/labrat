<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=4.0, user-scalable=yes">
<title>voxbone review — OA6-10RK_1</title>
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
<div id="app">
  <header><h1>voxbone review</h1><span class="sub" id="sub"></span>
    <span class="grow"></span><button class="icnbtn" id="themeBtn">🌙</button></header>
  <main>
    <section class="pane on" id="p3d"><div id="plot3d"></div>
      <div class="loading" id="load3d">building 3D…</div></section>
    <section class="pane" id="prev"><div class="scroll">
      <div class="banner warn" id="confbanner" style="display:none"></div>
      <div class="card"><h2>Sample</h2><div id="segbox"></div></div>
      <div class="card"><h2>Auto measurements (mm)</h2><div id="measauto"></div></div>
      <div class="card"><h2>Per-item verdict</h2><div id="verdicts"></div></div>
      <div class="card"><h2>Reviewer notes</h2><textarea id="notes" placeholder="Flag anything…"></textarea></div>
      <div class="card"><h2>Overall verdict</h2>
        <div class="verdict" id="overall">
          <label class="approve"><input type="radio" name="ov" value="approve"><span>Approve</span></label>
          <label class="fix"><input type="radio" name="ov" value="fix"><span>Needs fix</span></label>
          <label class="reject"><input type="radio" name="ov" value="reject"><span>Reject</span></label></div>
        <button class="btn" id="btnExport">⬇ Export review JSON</button></div>
    </div></section>
  </main>
  <nav>
    <button class="t on" data-p="p3d"><span class="ic">🧊</span>3D</button>
    <a class="t" href="femur.html"><span class="ic">🦴</span>Femur</a>
    <a class="t" href="tibia.html"><span class="ic">🦵</span>Tibia</a>
    <button class="t" data-p="prev"><span class="ic">✓</span>Review</button>
  </nav>
</div>
<script src="data/meta.js"></script>
<script src="data/meshes.js"></script>
<script src="shared.js"></script>
<script>
(async function(){
  BM.initTheme();
  const meta=await BM.loadMeta();
  document.getElementById('sub').textContent=meta.sample_id+' · per-bone aligned · '+meta.voxel_mm+' mm/vox';
  // in-page tab switch (3D <-> Review); Femur/Tibia are links to sibling pages
  document.querySelectorAll('nav .t[data-p]').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('nav .t').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
    document.getElementById(t.dataset.p).classList.add('on');
    if(t.dataset.p==='p3d'&&BM3D.elt) Plotly.Plots.resize(BM3D.elt);
  });
  await BM3D.build('plot3d'); document.getElementById('load3d').style.display='none';
  // review panel
  const m=meta.seg_notes,g=meta.gp_stats;
  const flag=m.femur_end_margin<0.15;
  if(flag){const b=document.getElementById('confbanner');b.style.display='block';
    b.textContent='⚠ Femur/tibia identity is LOW-CONFIDENCE (margin '+m.femur_end_margin+'). Confirm the femur is the condyle-bearing bone before approving.';}
  document.getElementById('segbox').innerHTML=
    kv('Femur/tibia call',m.femur_end+' (margin '+m.femur_end_margin+')')+
    kv('Alignment residual','femur '+meta.align.femur_tilt+'°, tibia '+meta.align.tibia_tilt+'°')+
    kv('Growth plate',g.thickness_mm+' mm, '+g.z_lo_mm_from_plateau+'–'+g.z_hi_mm_from_plateau+' mm below plateau');
  const M=meta.measurements;
  document.getElementById('measauto').innerHTML=
    kv('Femur width',M.femur_width_mm)+kv('Femur length',M.femur_length_mm)+kv('W/L ratio',M.wl_ratio)+
    kv('Tibia width',M.tibia_width_mm)+kv('Med comp height',M.med_compartment_height_mm)+kv('Lat comp height',M.lat_compartment_height_mm);
  function kv(k,v){return '<div class="kv"><span>'+k+'</span><b>'+v+'</b></div>';}
  // verdict items + persistence
  const items=['condyle_lateral','condyle_medial','intercondylar_notch','intercondylar_groove',
    'tibial_condyle_lateral','tibial_condyle_medial','femur_tibia_split','growth_plate','alignment'];
  const vroot=document.getElementById('verdicts'), st=BM.state();
  items.forEach(n=>{ const w=document.createElement('div'); w.style.margin='7px 0';
    w.innerHTML='<div style="font-size:11px;color:var(--mut);margin-bottom:2px">'+n.replace(/_/g,' ')+'</div>';
    const v=document.createElement('div'); v.className='verdict'; v.dataset.item=n;
    ['approve','fix','reject'].forEach(k=>{ const lab=document.createElement('label'); lab.className=k;
      const on=(st.item_verdicts&&st.item_verdicts[n]===k); if(on)lab.classList.add('on');
      lab.innerHTML='<input type="radio" name="v_'+n+'" value="'+k+'"'+(on?' checked':'')+'><span>'+k[0].toUpperCase()+'</span>';
      lab.onclick=()=>setTimeout(()=>{v.querySelectorAll('label').forEach(x=>x.classList.remove('on'));lab.classList.add('on');
        const s=BM.state();s.item_verdicts=s.item_verdicts||{};s.item_verdicts[n]=k;BM.save(s);},0);
      v.appendChild(lab);});
    w.appendChild(v); vroot.appendChild(w);});
  const notes=document.getElementById('notes'); notes.value=st.notes||'';
  notes.oninput=()=>BM.patch({notes:notes.value});
  if(st.overall){const r=document.querySelector('input[name=ov][value="'+st.overall+'"]');if(r){r.checked=true;r.closest('label').classList.add('on');}}
  document.querySelectorAll('input[name=ov]').forEach(r=>r.onchange=()=>{
    document.querySelectorAll('#overall label').forEach(x=>x.classList.remove('on'));
    r.closest('label').classList.add('on'); BM.patch({overall:r.value});});
  document.getElementById('btnExport').onclick=()=>{
    const s=BM.state();
    const out={sample_id:meta.sample_id,reviewed_at:new Date().toISOString(),
      overall_verdict:s.overall||null,reviewer_notes:s.notes||'',item_verdicts:s.item_verdicts||{},
      landmarks_edited:s.landmarks_edited||{},auto_measurements:meta.measurements,
      seg_notes:meta.seg_notes,align:meta.align,gp_stats:meta.gp_stats};
    const bl=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download=meta.sample_id+'_review.json';a.click();};
})();
</script>
</body>
</html>

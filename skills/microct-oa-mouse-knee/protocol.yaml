kind: protocol
name: microct-oa-mouse-knee
version: 1

expects:
  modality: CT
  body_part: [knee, hindlimb]
  species: [mouse]   # Tang et al. is mouse-specific; every landmark rule, cutoff, and scanner parameter is mouse-derived. Not validated for rat.
  min_slices: 100

phases:
  - id: intake
    skills:
      - resources/intake
    inputs: [input/]
    outputs:
      - intake/volume_metadata.json
      - intake/orientation_report.md
      - intake/stage_report.json
      - spacing.json
    # Per-phase interactive review artifact (review-provenance §3.D). A fresh
    # author session builds a document-style QC report from the intake outputs
    # after the scientific gate passes; published to artifacts/review-sites/intake/.
    review_artifact:
      type: document

  - id: segmentation
    # seed-review is its own phase below, not a segmentation skill — it loads
    # only when watershed returns needs-seeds.
    # reference-pack is loaded here: the structure-assignment subphase NAMES the
    # blobs by comparing the scene to the pack (no pretrained model for this
    # anatomy).
    skills:
      - resources/threshold
      - resources/watershed
      - resources/structure-assignment
      - resources/reference-pack
    inputs:
      - input/
      - intake/volume_metadata.json
      - spacing.json
    outputs:
      - labels.nii.gz
      - segmentation/filtered.nii.gz
      - segmentation/structure_assignments.json
      - segmentation/seeds.json
      - segmentation/metadata.json
      - segmentation/stage_report.json
      - masks/
      - structure_assignments.json
    subphases:
      - id: threshold
      - id: watershed
        depends_on: [threshold]
      - id: structure-assignment
        depends_on: [watershed]

  - id: seed-review
    skills:
      - resources/seed-review
    # components.nii.gz is intentionally NOT declared: it exists only when
    # watershed returns needs-seeds, and a clean pass deletes it, so declaring it
    # would make the common path look like it's missing an input. The seed-review
    # resource reads it when present.
    inputs:
      - labels.nii.gz
      - segmentation/seeds.json
      - segmentation/structure_assignments.json
    outputs:
      - labels.nii.gz
      - segmentation/seeds.json
      - structure_assignments.json
      - segmentation/structure_assignments.json

  - id: landmarks
    skills:
      - resources/landmarks
      - resources/reference-pack
    inputs:
      - labels.nii.gz
      - masks/
      - spacing.json
      - segmentation/filtered.nii.gz
    outputs:
      - landmarks/positions.json
      - landmarks/orientation_frame.json
      - landmarks.json

  - id: measurement
    skills:
      - resources/measurement
      - resources/reference-pack
    inputs:
      - landmarks.json
      - landmarks/positions.json
      - spacing.json
      - labels.nii.gz
      - masks/
    outputs:
      - measurements/results.json
      - measurements/qc_overlays.json
      - measurements/summary.md
      - measurements_final.json
    # Per-phase interactive review artifact (review-provenance §3.D). A fresh
    # author session builds a quantitative values-table site from the measurement
    # results after the scientific gate passes; published to
    # artifacts/review-sites/measurement/. Independent of the legacy final 3D site.
    review_artifact:
      type: quantitative

  - id: review-artifact
    # composes the review-artifact-builder skill (the review-UI method) — see
    # resources/review-artifact.md.
    skills:
      - resources/review-artifact
      - resources/reference-pack
    inputs:
      - measurements/results.json
      - measurements_final.json
      - landmarks/positions.json
      - labels.nii.gz                    # 3D mesh + slice-label overlay
      - segmentation/filtered.nii.gz     # grayscale for the orthogonal slices
      - masks/
    outputs:
      - review-site/index.html
      - review/geometry.json             # mesh geometry for the 3D scene (injected)
      - review/volume.json               # downsampled grayscale + RLE labels + landmarks for the slice scrubber (injected)
    # External-origin policy the gate reads for G6. Empty = fully offline, only
    # 'self'; this inlined spatial review site vendors nothing external (three.js
    # is inlined, not CDN-loaded).
    cdn_allowlist: []

runtime:
  # An off-the-shelf conda environment (numpy, nibabel, pydicom, scikit-image,
  # scipy, matplotlib) — see environment.yml. NOT a bespoke analysis package; the
  # agent writes the analysis code against these libraries per the parent method.
  substrate: microct_analysis

parent_skills:
  - understand-3d-medical-volume

agents:
  worker:
    model: opus
    tools:
      - Bash
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Task
      - record_phase
      - mark_subphase
      - blocked
    subagents:
      reviewer:
        description: >-
          Independent subphase verification — run the quantitative checks from
          the Verification section before marking a subphase pass.
        tools: [Bash, Read, Write, Grep, Glob]
        # Distinct from the independent gate-reviewer's review/verification/ —
        # the worker's own subphase checker must not share the gate-reviewer's
        # write scope (keeps the trust boundary intact).
        writable: [review/subphase-verification/]
    writable:
      - artifacts/
      - phases/
      - intake/
      - segmentation/
      - landmarks/
      - measurements/
      - masks/
  gate-reviewer:
    model: sonnet
    tools:
      - Bash
      - Read
      - Write
      - Grep
      - Glob
      - submit_gate_decision
    writable: [review/verification/]
    max_findings: 5
  monitor:
    model: opus
    permissions: bypassPermissions
    tools:
      - Read
      - Grep
      - Glob
      - submit_monitor_verdict
    writable: []
  # Per-phase review-artifact author (review-provenance §3.D). A fresh, confined
  # session that builds the phase's interactive review site from verified disk
  # outputs ONLY (no compute/Bash — it reads artifacts and writes the templated
  # site). read_past_history / view_human_feedback are author-only MCP tools.
  # Failure PAUSES with review-artifact-author-failed; verified science is never
  # touched. Required whenever any phase declares a non-legacy review_artifact.
  review-artifact-author:
    model: sonnet
    permissions: acceptEdits
    tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - read_past_history
      - view_human_feedback
    writable:
      - artifacts/review-sites/.staging/

requires:
  worker:
    tools: [Bash, Read, Write, Edit, Glob, Grep, Task]
    runtime:
      - python:nibabel
      - python:pydicom
      - python:scikit-image
      - python:scipy
      - python:matplotlib
      # MPLBACKEND is set unconditionally by the harness (headless PNG QC). No
      # env:PYTHONPATH — this protocol is package-free; there is no bespoke source
      # tree to point it at, and requiring it hard-fails task startup.
      - env:MPLBACKEND
  reviewer:
    runtime:
      - python:nibabel
      - python:numpy
      - python:scipy

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LabRat — Review Chain</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo">LabRat</span>
      <span class="badge" id="task-count">—</span>
    </div>
    <div class="task-list" id="task-list"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="title" id="topbar-id">—</div>
        <div class="subtitle" id="topbar-sub"></div>
      </div>
      <div class="spacer"></div>
      <button id="btn-chain" class="active-btn" data-view="chain">Review chain</button>
      <button id="btn-prov" data-view="provenance">Provenance</button>
    </div>

    <div class="live-strip">
      <span class="live-dot" id="live-dot"></span>
      <span class="live-label">Live</span>
      <span class="live-event" id="live-event">waiting for events…</span>
      <span class="live-time" id="live-time"></span>
    </div>

    <div class="content" id="view-chain"></div>
    <div class="content" id="view-provenance" style="display:none"></div>

    <div class="log-strip" id="log-strip" style="display:none">
      <div class="log-head">ephemeral log — not part of the record</div>
      <div id="log-lines"></div>
    </div>
  </main>
</div>

<div class="lightbox" id="lightbox">
  <img id="lightbox-img" alt="">
  <div class="cap" id="lightbox-cap"></div>
</div>

<script src="./app.js"></script>
</body>
</html>
